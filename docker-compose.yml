services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      PORT: 3000
      DATA_DIR: /data
      DATABASE_PATH: /data/ou-ssh.sqlite
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:8080/api/auth/github/callback}
    volumes:
      - ou-ssh-data:/data
    expose:
      - "3000"
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    env_file:
      - .env
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
      OU_SSH_SITE_ADDRESS: ${OU_SSH_SITE_ADDRESS:-:80}
    ports:
      - "${OU_SSH_HTTP_PORT:-80}:80"
      - "${OU_SSH_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ou-ssh-caddy-data:/data
      - ou-ssh-caddy-config:/config
    depends_on:
      - web
    profiles:
      - https
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ou-ssh-data:
  ou-ssh-caddy-data:
  ou-ssh-caddy-config:
